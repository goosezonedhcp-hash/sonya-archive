<!DOCTYPE html>
<html lang="ru">

<head>

<title>
NIGHTFALL ADMIN
</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>

<div id="app"></div>

<script>

document.getElementById(
"app"

).innerHTML=`

</span>

OBSERVER
</span>

<span>
LOCKED

</div>

<section class="panel">

<h1>

ПАНЕЛЬ НАБЛЮДАТЕЛЯ

</h1>

<br>

<input
id="pwd"
placeholder="пароль">

<button
onclick="login()">

</section>

<section
id="adminArea"

style="
display:none;
margin-top:20px;
">

<div class="grid">

<section class="panel">

<h2>

</h2>

height:180px;

function login(){

.getElementById(
